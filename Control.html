<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>음주 조절 모드</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.0.1"></script>
    
    <style>
        :root {
            --primary-color: #9b59b6; /* 조절 모드 테마 컬러 변경 */
            --danger-color: #e74c3c;
            --success-color: #2ecc71;
            --warning-color: #f39c12;
            --bg-color: #f0f2f5;
            --text-dark: #2d3748;
        }
        
        body { font-family: 'Pretendard', -apple-system, sans-serif; text-align: center; padding: 15px; background-color: var(--bg-color); color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 95vh; }
        .container { flex: 1; max-width: 550px; width: 100%; margin: 0 auto; background: white; padding: 30px 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); box-sizing: border-box; }
        h1 { font-size: 1.6rem; white-space: nowrap; word-break: keep-all; margin-bottom: 25px; letter-spacing: -0.5px; color: var(--text-dark); }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 0.9rem; color: #666; }
        .back-btn { background: #f1f3f5; border: none; padding: 6px 12px; border-radius: 8px; font-weight: 600; cursor: pointer; color: #495057; text-decoration: none; }
        
        .card-box { background: #fdfdfd; border: 1px solid #e2e8f0; border-radius: 20px; padding: 25px 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .card-title { font-size: 1.1rem; font-weight: 800; color: var(--primary-color); margin-bottom: 15px; text-align: left; display: flex; align-items: center; gap: 8px; }
        
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-weight: 700; font-size: 0.9rem; color: #4a5568; margin-bottom: 6px; }
        input[type="number"], select { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 12px; font-size: 1rem; font-family: inherit; box-sizing: border-box; background: #fff; }
        input[type="number"]:focus, select:focus { border-color: var(--primary-color); outline: none; }
        
        .action-btn { width: 100%; padding: 18px; font-size: 1.15rem; font-weight: 800; color: white; border: none; border-radius: 16px; cursor: pointer; box-shadow: 0 8px 15px rgba(0,0,0,0.1); transition: transform 0.2s; margin-top: 10px; }
        .action-btn:active { transform: scale(0.97); }
        .btn-start { background: linear-gradient(135deg, #9b59b6, #8e44ad); }
        .btn-end { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        
        .status-display { font-size: 1.2rem; font-weight: 800; color: var(--danger-color); background: #ffe3e3; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px dashed var(--danger-color); }
        
        .chart-container { position: relative; height: 280px; width: 100%; margin-top: 20px; }
        
        #loadingArea { display: flex; align-items: center; justify-content: center; height: 50vh; color: #718096; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-bar">
        <span id="userNameDisplay" style="font-weight: 700; color: var(--primary-color);">로딩 중...</span>
        <button class="back-btn" onclick="location.href='index.html'">리포트로 복귀</button>
    </div>

    <h1>🍷 음주 조절 모드</h1>
    <p style="font-size: 0.9rem; color: #666; word-break: keep-all; margin-bottom: 25px;">
        단주가 깨졌더라도, 이성의 끈을 놓지 않고 자신의 <b>알코올 섭취량을 통제</b>하는 훈련 모드입니다. 혈중 알코올 농도를 확인하며 안전하게 조절하세요.
    </p>

    <div id="loadingArea">로그인 상태 확인 중...</div>

    <div id="mainControlArea" style="display: none;">
        <!-- 1. 기본 설정 및 주류 선택 카드 -->
        <div class="card-box" id="setupCard">
            <div class="card-title"><span>📝</span> 섭취 정보 입력</div>
            
            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex: 1;">
                    <label>성별</label>
                    <select id="userGender">
                        <option value="male">남성</option>
                        <option value="female">여성</option>
                    </select>
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>체중 (kg)</label>
                    <input type="number" id="userWeight" placeholder="예: 70" value="70">
                </div>
            </div>

            <div class="input-group">
                <label>식사 상태 (안주량)</label>
                <select id="userMeal">
                    <option value="0.5">완전 공복 (흡수 매우 빠름)</option>
                    <option value="1.0" selected>가벼운 식사/안주 (보통)</option>
                    <option value="1.5">든든한 식사 (흡수 지연)</option>
                </select>
            </div>

            <div style="border-top: 1px dashed #e2e8f0; margin: 20px 0;"></div>

            <div class="input-group">
                <label>드시는 술 종류</label>
                <select id="drinkType">
                    <option value="4.5">맥주 (4.5%)</option>
                    <option value="16.5">소주 (16.5%)</option>
                    <option value="13.0">와인 (13%)</option>
                    <option value="40.0">위스키 (40%)</option>
                </select>
            </div>
            
            <div class="input-group">
                <label>예정/목표 용량 (ml)</label>
                <input type="number" id="drinkVolume" placeholder="예: 500" value="500">
            </div>

            <button class="action-btn btn-start" onclick="startDrinking()">🍺 이 계획대로 음주 시작</button>
        </div>

        <!-- 2. 음주 진행 카드 -->
        <div class="card-box" id="activeCard" style="display: none;">
            <div class="card-title"><span>⏳</span> 통제 하에 음주 중...</div>
            <div class="status-display" id="startTimeDisplay">시작 시간: --:--</div>
            <p style="font-size: 0.85rem; color: #666; margin-bottom: 20px;">자신이 계획한 용량만큼만 천천히 드세요.<br>입력한 술을 모두 드셨다면 아래 버튼을 눌러주세요.</p>
            
            <button class="action-btn btn-end" onclick="finishDrinking()">🛑 해당 술 모두 마심 (측정 종료)</button>
            <button class="back-btn" style="width: 100%; padding: 12px; margin-top: 10px;" onclick="cancelDrinking()">계획 취소 및 재설정</button>
        </div>

        <!-- 3. 결과 및 그래프 카드 -->
        <div class="card-box" id="resultCard" style="display: none;">
            <div class="card-title"><span>📈</span> 혈중 알코올 농도 (BAC) 예측</div>
            <p style="font-size: 0.85rem; color: #4a5568; line-height: 1.5; text-align: left; margin-bottom: 10px;" id="resultSummary"></p>
            
            <div class="chart-container">
                <canvas id="bacChart"></canvas>
            </div>
            
            <button class="back-btn" style="width: 100%; padding: 15px; margin-top: 20px; border: 1px solid #ddd;" onclick="resetAll()">새로운 조절 계획 세우기</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBWDwueP3a0atxCqFIgqd96sgXc0EqYbEY",
        authDomain: "alcoholaway.firebaseapp.com",
        projectId: "alcoholaway",
        storageBucket: "alcoholaway.firebasestorage.app",
        messagingSenderId: "1001199235857",
        appId: "1:1001199235857:web:362c4aae36b44c7eae12b0",
        measurementId: "G-JBE26PCZMF"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    let userId = null;
    let sessionStartTime = null;
    let sessionEndTime = null;
    let bacChartInstance = null;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            userId = user.uid;
            document.getElementById('loadingArea').style.display = 'none';
            document.getElementById('mainControlArea').style.display = 'block';
            document.getElementById('userNameDisplay').innerText = (user.displayName || '도전자') + '님의 조절 모드';
        } else {
            alert("로그인이 필요합니다. 메인 리포트 화면으로 이동합니다.");
            window.location.href = 'index.html';
        }
    });

    window.startDrinking = function() {
        const weight = document.getElementById('userWeight').value;
        const volume = document.getElementById('drinkVolume').value;
        
        if(!weight || weight <= 0) return alert("체중을 올바르게 입력해주세요.");
        if(!volume || volume <= 0) return alert("음주 용량을 올바르게 입력해주세요.");

        sessionStartTime = new Date();
        const timeStr = sessionStartTime.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
        
        document.getElementById('setupCard').style.display = 'none';
        document.getElementById('activeCard').style.display = 'block';
        document.getElementById('startTimeDisplay').innerText = `시작 시간: ${timeStr}`;
    };

    window.cancelDrinking = function() {
        sessionStartTime = null;
        document.getElementById('setupCard').style.display = 'block';
        document.getElementById('activeCard').style.display = 'none';
    };

    window.finishDrinking = function() {
        sessionEndTime = new Date();
        document.getElementById('activeCard').style.display = 'none';
        document.getElementById('resultCard').style.display = 'block';
        
        calculateAndDrawBAC();
    };

    window.resetAll = function() {
        sessionStartTime = null;
        sessionEndTime = null;
        if(bacChartInstance) bacChartInstance.destroy();
        
        document.getElementById('setupCard').style.display = 'block';
        document.getElementById('resultCard').style.display = 'none';
        document.getElementById('drinkVolume').value = '';
    };

    function calculateAndDrawBAC() {
        const gender = document.getElementById('userGender').value;
        const weight = parseFloat(document.getElementById('userWeight').value);
        const mealOffsetHrs = parseFloat(document.getElementById('userMeal').value);
        const abv = parseFloat(document.getElementById('drinkType').value);
        const volume = parseFloat(document.getElementById('drinkVolume').value);

        // 한국 위드마크 공식 체내흡수율 상수 및 성별 계수
        const r = gender === 'male' ? 0.86 : 0.64;
        
        // 알코올 g = 용량(ml) * 도수(%) * 알코올비중(0.7894)
        const alcoholGrams = volume * (abv / 100) * 0.7894;
        
        // 최대 혈중알코올농도 (%)
        // C_max = (알코올 질량 * 0.7(체내흡수율)) / (체중 * 성별계수 * 10)
        let cMax = (alcoholGrams * 0.7) / (weight * r * 10);
        
        const startMs = sessionStartTime.getTime();
        const endMs = sessionEndTime.getTime();
        const durationHrs = (endMs - startMs) / 3600000;
        
        // 정점 시간: 섭취 종료 시간 + 식사에 따른 지연시간
        const peakMs = endMs + (mealOffsetHrs * 3600000);
        
        // 분해율 (시간당 0.015% 감소)
        const beta = 0.015;
        
        const dataPoints = [];
        const labels = [];
        
        // 시작 시간부터 알코올이 0이 될때까지 15분 단위로 차트 생성
        let currentMs = startMs;
        let isZeroReached = false;
        
        while(!isZeroReached && currentMs < startMs + (24 * 3600000)) { // 최대 24시간
            const timeObj = new Date(currentMs);
            const timeLabel = timeObj.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
            
            let bac = 0;
            if (currentMs <= endMs) {
                // 마시는 중 (선형 증가 가정)
                const progress = (currentMs - startMs) / (endMs - startMs || 1);
                // 마시는 동안에도 식사 흡수 지연을 고려해 일부만 도달했다고 시뮬레이션
                bac = (cMax * progress) * 0.5; 
            } else if (currentMs <= peakMs) {
                // 종료 후 정점까지 도달 중
                const progress = (currentMs - endMs) / (peakMs - endMs);
                const base = cMax * 0.5;
                bac = base + ((cMax - base) * progress);
            } else {
                // 정점 이후 분해 시작
                const hrsSincePeak = (currentMs - peakMs) / 3600000;
                bac = cMax - (beta * hrsSincePeak);
            }
            
            if(bac < 0) {
                bac = 0;
                isZeroReached = true;
            }
            
            labels.push(timeLabel);
            dataPoints.push(bac.toFixed(3));
            
            if(isZeroReached) break;
            currentMs += 15 * 60000; // 15분 추가
        }

        const drinkName = document.getElementById('drinkType').options[document.getElementById('drinkType').selectedIndex].text;
        const totalClearHrs = (currentMs - startMs) / 3600000;
        
        document.getElementById('resultSummary').innerHTML = `
            <b>${drinkName} ${volume}ml</b> 섭취 분석:<br>
            • 예측 최고 농도: <b style="color:var(--danger-color);">${cMax.toFixed(3)}%</b><br>
            • 체내 알코올 완전 분해 소요시간: 약 <b style="color:var(--primary-color);">${totalClearHrs.toFixed(1)}시간</b>
        `;

        if (bacChartInstance) bacChartInstance.destroy();
        const ctx = document.getElementById('bacChart').getContext('2d');
        
        bacChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '혈중 알코올 농도 (%)',
                    data: dataPoints,
                    borderColor: '#9b59b6',
                    backgroundColor: 'rgba(155, 89, 182, 0.2)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { 
                        beginAtZero: true, 
                        title: { display: true, text: 'BAC (%)' }
                    },
                    x: {
                        ticks: { maxTicksLimit: 8 }
                    }
                },
                plugins: {
                    legend: { display: false },
                    annotation: {
                        annotations: {
                            dangerLine: {
                                type: 'line',
                                yMin: 0.03,
                                yMax: 0.03,
                                borderColor: '#e74c3c',
                                borderWidth: 2,
                                borderDash: [4, 4],
                                label: {
                                    display: true,
                                    content: '면허 정지 기준 (0.03%)',
                                    position: 'end',
                                    backgroundColor: '#e74c3c',
                                    font: { size: 10 }
                                }
                            }
                        }
                    }
                }
            }
        });
    }
</script>
</body>
</html>
