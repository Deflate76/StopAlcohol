<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>금주 서바이벌 리포트</title>
    
    <meta name="description" content="1,000명의 도전자와 함께하는 금주 서바이벌 레이스" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="금주서바이벌" />
    
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="icon" href="/favicon.ico" sizes="any" />

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.0.1"></script>
    
    <script src="recovery.js"></script>
    
    <style>
        :root {
            --primary-color: #3498db;
            --danger-color: #e74c3c;
            --success-color: #2ecc71;
            --warning-color: #f39c12;
            --bg-color: #f0f2f5;
            --text-dark: #2d3748;
        }
        
        body { font-family: 'Pretendard', -apple-system, sans-serif; text-align: center; padding: 15px; background-color: var(--bg-color); color: #333; line-height: 1.6; }
        .container { max-width: 550px; margin: 0 auto; background: white; padding: 30px 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); box-sizing: border-box; }
        h1 { font-size: 1.6rem; white-space: nowrap; word-break: keep-all; margin-bottom: 25px; letter-spacing: -0.5px; color: var(--text-dark); }
        
        #setupArea { padding: 20px 0; display: flex; flex-direction: column; align-items: center; }
        #dateTimeInput { width: 100%; max-width: 320px; padding: 16px; font-size: 1.05rem; font-weight: 600; color: var(--text-dark); border: 2px solid #e2e8f0; border-radius: 16px; margin-bottom: 20px; text-align: center; font-family: inherit; }
        
        .start-btn { width: 100%; max-width: 320px; padding: 18px; font-size: 1.2rem; font-weight: 800; background: linear-gradient(135deg, #3498db, #2980b9); color: white; border: none; border-radius: 16px; cursor: pointer; box-shadow: 0 10px 20px rgba(52, 152, 219, 0.3); transition: transform 0.2s; }
        .start-btn:active { transform: scale(0.97); }
        
        .timer-display { margin: 15px 0; padding: 25px 20px; background: #fff5f5; border-radius: 20px; border: 1px solid #ffe3e3; }
        .time-unit { display: block; font-size: 3rem; font-weight: 800; color: var(--danger-color); line-height: 1.2; }
        #subTime { font-size: 1.2rem; font-weight: 600; color: #555; margin-top: 5px; }
        
        .sub-progress-container { width: 100%; max-width: 300px; margin: 12px auto 0; }
        .sub-progress-bg { background: #ffe3e3; height: 10px; border-radius: 5px; overflow: hidden; position: relative; }
        .sub-progress-fill { background: var(--danger-color); height: 100%; width: 0%; transition: width 1s linear; }
        .sub-percent-text { font-size: 0.8rem; color: #e74c3c; font-weight: 700; margin-top: 4px; display: block; }
        
        .rank-info { background: #e3f2fd; padding: 20px 15px; border-radius: 20px; margin: 15px 0; border: 1px solid #bbdefb; display: flex; flex-direction: column; gap: 10px; }
        .rank-item { display: flex; justify-content: center; align-items: baseline; gap: 6px; }
        .rank-number { font-size: 1.5rem; font-weight: 800; color: #1976d2; }
        
        .craving-section { margin-top: 25px; padding: 20px; background: #fff9f0; border-radius: 20px; border: 1px dashed var(--warning-color); }
        .craving-btn { background-color: var(--warning-color); color: white; border: none; padding: 15px; border-radius: 14px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 12px; font-size: 1rem; }
        .stat-btn { background-color: #fff; color: var(--warning-color); border: 2px solid var(--warning-color); padding: 10px; border-radius: 12px; font-size: 0.9rem; cursor: pointer; width: 100%; font-weight: bold; }
        
        .chart-container { position: relative; height: 250px; width: 100%; margin: 10px 0 25px 0; }
        
        /* 로드맵 카드 스타일 */
        .change-card { background: #fff; border: 1px solid #e1e4e8; border-radius: 14px; padding: 15px; margin-bottom: 12px; text-align: left; transition: all 0.3s ease; }
        .progress-bg { background: #eee; height: 16px; border-radius: 8px; overflow: hidden; width: 100px; position: relative; display: flex; align-items: center; justify-content: center; }
        .progress-fill { background: linear-gradient(90deg, #f39c12, #e67e22); height: 100%; width: 0%; transition: width 0.5s ease; position: absolute; left: 0; }
        .progress-text { position: absolute; font-size: 10px; font-weight: 800; color: #444; z-index: 2; }
        .change-card.active { border-color: var(--success-color); background-color: #fafffa; box-shadow: 0 4px 12px rgba(46, 204, 113, 0.1); }
        .change-card.active .progress-fill { background: linear-gradient(90deg, #2ecc71, #27ae60); }
        .change-card.active .progress-text { color: #fff; }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: white; padding: 30px 25px; border-radius: 24px; width: 88%; max-width: 400px; text-align: left; position: relative; box-sizing: border-box; }
        .reset-btn { background-color: transparent; color: #a0aec0; margin-top: 10px; border: none; text-decoration: underline; cursor: pointer; font-size: 0.85rem; width: 100%; }
        .highlight { color: var(--primary-color); font-weight: 700; }
        textarea, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-top: 10px; font-family: inherit; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚫 금주 서바이벌 리포트</h1>
    
    <div id="setupArea">
        <p><span class="highlight">1,000명의 도전자</span>와 함께하는 레이스!<br>마지막으로 술을 드신 일시를 선택해 주세요.</p>
        <input type="datetime-local" id="dateTimeInput">
        <button class="start-btn" onclick="saveDate()">도전 시작하기</button>
    </div>

    <div id="displayArea" style="display: none;">
        <div class="timer-display">
            <span id="mainDays" class="time-unit">0일</span>
            <div id="subTime">0시간 0분 0초</div>
            <div class="sub-progress-container">
                <div class="sub-progress-bg"><div class="sub-progress-fill" id="subFill"></div></div>
                <span class="sub-percent-text" id="subPercent">오늘의 목표: 0.0% 달성</span>
            </div>
        </div>

        <div class="rank-info">
            <div class="rank-item">현재 1,000명 중 <span class="rank-number" id="survivors">1,000</span>명 생존</div>
            <div class="rank-item">나의 현재 순위 : <span class="rank-number" id="myRank">1</span>위</div>
        </div>

        <div class="craving-section">
            <button class="craving-btn" onclick="openModal('cravingModal')">🔥 지금 고비가 왔어요!</button>
            <button class="stat-btn" onclick="openStats()">📈 총 <span id="cravingCount">0</span>번의 고비를 넘겼습니다</button>
        </div>

        <div class="chart-container"><canvas id="survivalChart"></canvas></div>

        <div class="change-section">
            <h3 style="margin-bottom: 20px; text-align: center;">🧬 신체 회복 로드맵</h3>
            <div id="changeList"></div>
        </div>
        
        <div style="font-size: 0.8rem; color: #999; margin-top: 20px;">도전 세팅 일시: <span id="displaySettingDate">-</span></div>
        <button class="reset-btn" onclick="resetDate()">데이터 초기화 및 재설정</button>
    </div>
</div>

<div id="cravingModal" class="modal">
    <div class="modal-content">
        <h3 style="margin-top:0">고비 기록하기</h3>
        <label style="font-weight:700; font-size:0.9rem;">갈망 강도 (<span id="rangeVal" style="color:var(--danger-color)">5</span>/10)</label>
        <input type="range" id="cravingRange" min="1" max="10" value="5" oninput="document.getElementById('rangeVal').innerText = this.value" style="width:100%; margin:15px 0;">
        <select id="cravingReason" onchange="toggleEtc(this.value)">
            <option value="스트레스">업무 및 일상 스트레스</option>
            <option value="회식/모임">회식 또는 사교 모임</option>
            <option value="우울/공허">우울하거나 외로운 기분</option>
            <option value="습관/지루함">그냥 습관적으로(지루함)</option>
            <option value="보상심리">고생한 나에 대한 보상</option>
            <option value="기타">기타 (직접 입력)</option>
        </select>
        <textarea id="etcReason" style="display:none;" placeholder="구체적인 사유를 적어주세요"></textarea>
        <button class="start-btn" style="margin-top:25px; width:100%;" onclick="submitCraving()">이 고비 기록하고 참기</button>
        <button onclick="closeModal('cravingModal')" style="width:100%; border:none; background:none; margin-top:15px; color:#999; cursor:pointer;">닫기</button>
    </div>
</div>

<div id="statsModal" class="modal">
    <div class="modal-content" style="max-width: 450px;">
        <h3 style="margin-top:0">나의 고비 극복 리포트</h3>
        <div style="height: 250px;"><canvas id="cravingHistoryChart"></canvas></div>
        <button onclick="closeModal('statsModal')" style="width:100%; border:none; background:none; margin-top:20px; color:#999; cursor:pointer;">닫기</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, arrayUnion, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBWDwueP3a0atxCqFIgqd96sgXc0EqYbEY",
        authDomain: "alcoholaway.firebaseapp.com",
        projectId: "alcoholaway",
        storageBucket: "alcoholaway.firebasestorage.app",
        messagingSenderId: "1001199235857",
        appId: "1:1001199235857:web:362c4aae36b44c7eae12b0",
        measurementId: "G-JBE26PCZMF"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let userId = localStorage.getItem('sober_user_id') || ('user_' + Math.random().toString(36).substr(2, 9));
    localStorage.setItem('sober_user_id', userId);

    let mainChart = null;
    let statsChart = null;
    let cravingData = [];
    let timerInterval = null;

    window.onload = async function() {
        // [수정 핵심] recovery.js에서 정의한 stages를 바로 사용합니다.
        renderChangeCards();
        
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('dateTimeInput').value = now.toISOString().slice(0, 16);

        try {
            const userDoc = await getDoc(doc(db, "users", userId));
            if (userDoc.exists()) {
                const data = userDoc.data();
                if (data.quitDate) {
                    cravingData = data.cravingHistory || [];
                    document.getElementById('cravingCount').innerText = cravingData.length;
                    startApp(data.quitDate);
                }
            }
        } catch (e) { console.error("데이터 로드 에러:", e); }
    };

    window.startApp = function(startISO) {
        document.getElementById('setupArea').style.display = 'none';
        document.getElementById('displayArea').style.display = 'block';
        document.getElementById('displaySettingDate').innerText = new Date(startISO).toLocaleString('ko-KR');

        initSurvivalChart();

        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            const start = new Date(startISO);
            const now = new Date();
            const diff = now - start;
            if (diff < 0) return;

            const days = diff / 86400000;
            const hours = Math.floor((diff/3600000)%24);
            const minutes = Math.floor((diff/60000)%60);
            const seconds = Math.floor((diff/1000)%60);

            document.getElementById('mainDays').innerText = Math.floor(days) + "일";
            document.getElementById('subTime').innerText = `${hours}시간 ${minutes}분 ${seconds}초`;
            
            const dailyProgress = ((hours * 3600 + minutes * 60 + seconds) / 86400) * 100;
            document.getElementById('subFill').style.width = dailyProgress + '%';
            document.getElementById('subPercent').innerText = `오늘의 목표: ${dailyProgress.toFixed(1)}% 달성`;

            const survivors = Math.max(1, Math.round(1000 * Math.exp(-0.04 * days)));
            document.getElementById('survivors').innerText = survivors.toLocaleString();
            document.getElementById('myRank').innerText = survivors.toLocaleString();

            updateChart(days);
            updateRoadmap(days); // 타이머가 돌 때 로드맵도 같이 업데이트
        }, 1000);
    };

    window.saveDate = async function() {
        const input = document.getElementById('dateTimeInput').value;
        if (!input) return alert("일시를 선택해 주세요.");
        try {
            await setDoc(doc(db, "users", userId), { quitDate: input, createdAt: new Date() }, { merge: true });
            startApp(input);
        } catch (e) { alert("연동 에러: " + e.code); }
    };

    window.submitCraving = async function() {
        const strength = document.getElementById('cravingRange').value;
        const reason = document.getElementById('cravingReason').value;
        const entry = {
            date: new Date().toLocaleString('ko-KR', {month:'short', day:'numeric', hour:'numeric'}),
            strength: parseInt(strength),
            reason: reason === '기타' ? document.getElementById('etcReason').value : reason,
            timestamp: new Date().getTime()
        };
        try {
            await updateDoc(doc(db, "users", userId), { cravingHistory: arrayUnion(entry) });
            cravingData.push(entry);
            document.getElementById('cravingCount').innerText = cravingData.length;
            closeModal('cravingModal');
            alert("고비를 잘 넘기셨습니다!");
        } catch (e) { alert("저장 실패"); }
    };

    // 로드맵 카드 생성 함수 (버그 수정됨)
    function renderChangeCards() {
        // stages 변수가 선언되었는지 확인
        if (typeof stages === 'undefined') {
            console.error("recovery.js 파일에서 stages 데이터를 찾을 수 없습니다.");
            return;
        }
        
        document.getElementById('changeList').innerHTML = stages.map((s, i) => `
            <div class="change-card" id="card${i}">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:700; font-size:0.95rem;">${s.t}</span>
                    <div class="progress-bg">
                        <span class="progress-text" id="text${i}">0%</span>
                        <div class="progress-fill" id="fill${i}"></div>
                    </div>
                </div>
                <p style="font-size:0.85rem; color:#666; margin-top:6px;">${s.desc}</p>
            </div>
        `).join('');
    }

    // 로드맵 퍼센트 업데이트 함수
    function updateRoadmap(days) {
        if (typeof stages === 'undefined') return;
        stages.forEach((s, i) => {
            const perc = Math.min((days / s.d) * 100, 100);
            const fill = document.getElementById(`fill${i}`);
            const text = document.getElementById(`text${i}`);
            const card = document.getElementById(`card${i}`);
            if (fill) fill.style.width = perc + '%';
            if (text) text.innerText = Math.floor(perc) + '%';
            if (card) {
                if (perc >= 100) card.classList.add('active');
                else card.classList.remove('active');
            }
        });
    }

    // 차트 초기화 (기존 동일)
    function initSurvivalChart() {
        const ctx = document.getElementById('survivalChart').getContext('2d');
        mainChart = new Chart(ctx, {
            type: 'line',
            data: { datasets: [
                { label: '탈락 영역', data: [], borderColor: '#e74c3c', backgroundColor: 'rgba(231, 76, 60, 0.4)', fill: true, pointRadius: 0, tension: 0.3 },
                { label: '생존 영역', data: [], borderColor: '#2ecc71', backgroundColor: 'rgba(46, 204, 113, 0.4)', fill: true, pointRadius: 0, tension: 0.3 }
            ]},
            options: { responsive: true, maintainAspectRatio: false, scales: { x: { type: 'linear', min: 0, max: 100 }, y: { beginAtZero: true, max: 1000 } }, plugins: { legend: { display: false }, annotation: { annotations: { line1: { type: 'line', xMin: 0, xMax: 0, borderColor: 'black', borderWidth: 2, label: { display: true, content: '현재', position: 'end' } } } } } }
        });
    }

    function updateChart(days) {
        if (!mainChart) return;
        const past = []; const future = [];
        for (let i = 0; i <= days; i++) past.push({x: i, y: 1000 * Math.exp(-0.04 * i)});
        past.push({x: days, y: 1000 * Math.exp(-0.04 * days)});
        for (let i = Math.ceil(days); i <= 100; i++) future.push({x: i, y: 1000 * Math.exp(-0.04 * i)});
        mainChart.data.datasets[0].data = past;
        mainChart.data.datasets[1].data = future;
        mainChart.options.plugins.annotation.annotations.line1.xMin = days;
        mainChart.options.plugins.annotation.annotations.line1.xMax = days;
        mainChart.update('none');
    }

    // UI 모달 함수
    window.openStats = function() {
        if (cravingData.length === 0) return alert("기록된 고비가 없습니다.");
        openModal('statsModal');
        setTimeout(() => {
            const ctx = document.getElementById('cravingHistoryChart').getContext('2d');
            if (statsChart) statsChart.destroy();
            const lastData = cravingData.slice(-10);
            statsChart = new Chart(ctx, {
                type: 'bar',
                data: { labels: lastData.map(d => d.date), datasets: [{ label: '갈망 강도', data: lastData.map(d => d.strength), backgroundColor: '#e74c3c' }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }, 200);
    };

    window.resetDate = async function() {
        if (confirm("서버의 모든 기록이 초기화됩니다. 계속할까요?")) {
            try { await deleteDoc(doc(db, "users", userId)); location.reload(); } catch (e) { alert("초기화 실패"); }
        }
    };

    window.openModal = (id) => document.getElementById(id).style.display = 'flex';
    window.closeModal = (id) => document.getElementById(id).style.display = 'none';
    window.toggleEtc = (val) => document.getElementById('etcReason').style.display = (val === '기타') ? 'block' : 'none';

</script>
</body>
</html>
