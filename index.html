<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>금주 서바이벌 & 신체 변화 로드맵</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.0.1"></script>
    
    <style>
        :root {
            --primary-color: #3498db;
            --danger-color: #e74c3c;
            --success-color: #2ecc71;
            --warning-color: #f39c12;
            --bg-color: #f0f2f5;
        }
        body { font-family: 'Pretendard', -apple-system, sans-serif; text-align: center; padding: 15px; background-color: var(--bg-color); color: #333; line-height: 1.6; }
        .container { max-width: 550px; margin: 0 auto; background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        h1 { font-size: 1.6rem; white-space: nowrap; word-break: keep-all; margin-bottom: 20px; }

        /* 타이머 & 랭킹 */
        .timer-display { margin: 15px 0; padding: 20px; background: #fff5f5; border-radius: 15px; border: 1px solid #ffe3e3; }
        .time-unit { display: block; font-size: 2.8rem; font-weight: 800; color: var(--danger-color); }
        .rank-info { background: #e3f2fd; padding: 15px; border-radius: 15px; margin: 15px 0; border: 1px solid #bbdefb; }
        .rank-number { font-size: 1.5rem; font-weight: bold; color: #1976d2; }
        
        /* 갈망 섹션 */
        .craving-section { margin-top: 25px; padding: 20px; background: #fff9f0; border-radius: 18px; border: 1px dashed var(--warning-color); }
        .craving-btn { background-color: var(--warning-color); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .stat-btn { background-color: #fff; color: var(--warning-color); border: 2px solid var(--warning-color); padding: 8px; border-radius: 10px; font-size: 0.9rem; cursor: pointer; width: 100%; font-weight: bold; }

        /* 모달 스타일 */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; text-align: left; position: relative; }
        .close-modal { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; color: #999; }
        
        /* 폼 요소 */
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 0.9rem; }
        input[type="range"] { width: 100%; margin: 10px 0; }
        select, textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; margin-top: 5px; box-sizing: border-box; }
        
        .chart-container { position: relative; height: 260px; width: 100%; margin-top: 20px; }
        
        /* 로드맵 */
        .change-section { margin-top: 30px; text-align: left; border-top: 2px solid #eee; padding-top: 20px; }
        .change-card { background: #fff; border: 1px solid #e1e4e8; border-radius: 12px; padding: 12px 15px; margin-bottom: 10px; }
        .change-card.active { border-color: var(--success-color); background-color: #fafffa; }
        .change-card.doing { border-color: var(--primary-color); background-color: #f0f7ff; }
        .progress-bg { background: #eee; height: 8px; border-radius: 4px; overflow: hidden; width: 70px; }
        .progress-fill { background: var(--primary-color); height: 100%; width: 0%; transition: width 0.5s ease; }
        
        .main-btn { width: 100%; padding: 15px; font-size: 16px; font-weight: bold; background-color: var(--primary-color); color: white; border: none; border-radius: 10px; cursor: pointer; }
        .reset-btn { background-color: transparent; color: #bdc3c7; margin-top: 20px; border: none; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚫 금주 서바이벌 리포트</h1>
    
    <div id="setupArea">
        <input type="datetime-local" id="dateTimeInput">
        <button class="main-btn" onclick="saveDate()">도전 시작</button>
    </div>

    <div id="displayArea" style="display: none;">
        <div class="timer-display">
            <span id="mainDays" class="time-unit">0일</span>
            <div id="subTime">0시간 0분 0초</div>
        </div>

        <div class="rank-info">
            <div>현재 생존자: <span class="rank-number" id="survivors">1,000</span>명 / 내 순위: <span class="rank-number" id="myRank">1</span>위</div>
        </div>

        <div class="craving-section">
            <button class="craving-btn" onclick="openModal('cravingModal')">🔥 지금 고비가 왔어요!</button>
            <button class="stat-btn" onclick="openStats()">📈 총 <span id="cravingCount">0</span>번의 고비를 넘겼습니다 (기록보기)</button>
        </div>

        <div class="chart-container">
            <canvas id="survivalChart"></canvas>
        </div>

        <div class="change-section">
            <h3 style="text-align: center;">🧬 신체 회복 로드맵</h3>
            <div id="changeList"></div>
        </div>
        
        <button class="reset-btn" onclick="resetDate()">기록 재설정</button>
    </div>
</div>

<div id="cravingModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal('cravingModal')">&times;</span>
        <h3>지금 기분이 어떠신가요?</h3>
        <label>갈망 강도 (1: 참을만함 ~ 10: 폭발직전)</label>
        <input type="range" id="cravingRange" min="1" max="10" value="5" oninput="document.getElementById('rangeVal').innerText = this.value">
        <div style="text-align: center; font-weight: bold; color: var(--danger-color);"><span id="rangeVal">5</span> / 10</div>

        <label>갈망 원인</label>
        <select id="cravingReason" onchange="toggleEtc(this.value)">
            <option value="스트레스">업무/일상 스트레스</option>
            <option value="회식/모임">회식 또는 사교 모임</option>
            <option value="우울/공허">우울하거나 외로운 기분</option>
            <option value="습관/지루함">그냥 습관적으로(지루함)</option>
            <option value="보상심리">고생한 나에 대한 보상</option>
            <option value="기타">기타 (직접 입력)</option>
        </select>
        <textarea id="etcReason" style="display:none; margin-top:10px;" placeholder="사유를 간단히 적어주세요"></textarea>

        <button class="main-btn" style="margin-top:20px; background-color: var(--warning-color);" onclick="submitCraving()">기록하고 이겨내기</button>
    </div>
</div>

<div id="statsModal" class="modal">
    <div class="modal-content" style="max-width: 500px;">
        <span class="close-modal" onclick="closeModal('statsModal')">&times;</span>
        <h3>나의 고비 극복 타임라인</h3>
        <div style="height: 300px;">
            <canvas id="cravingHistoryChart"></canvas>
        </div>
        <p style="font-size: 0.8rem; color: #666; margin-top: 10px;">* 최근 10개의 기록이 표시됩니다.</p>
    </div>
</div>

<script>
    let timerInterval = null;
    let mainChart = null;
    let statsChart = null;
    let cravingData = JSON.parse(localStorage.getItem('cravingHistory') || '[]');

    const stages = [
        { d: 1, t: "1일: 알코올 해독", desc: "혈당 수치가 안정화되고 독소 배출이 시작됩니다." },
        { d: 7, t: "1주: 수면의 질 향상", desc: "REM 수면 비중이 늘어나 개운함을 느낍니다." },
        { d: 14, t: "2주: 위장 회복", desc: "역류성 식도염 증상이 완화되고 소화가 잘 됩니다." },
        { d: 30, t: "1개월: 간 기능 부활", desc: "간 지방 수치가 감소하며 피부 안색이 맑아집니다." },
        { d: 90, t: "3개월: 면역력 강화", desc: "혈액세포가 교체되며 면역 시스템이 견고해집니다." },
        { d: 365, t: "1년: 암 위험 급감", desc: "각종 암 발생 위험이 일반인 수준으로 낮아집니다." }
    ];

    window.onload = function() {
        renderChangeCards();
        updateCravingUI();
        const saved = localStorage.getItem('quitDrinkingDateTime');
        if (saved) startApp(saved);
    };

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function toggleEtc(val) { document.getElementById('etcReason').style.display = (val === '기타') ? 'block' : 'none'; }

    function updateCravingUI() {
        document.getElementById('cravingCount').innerText = cravingData.length;
    }

    function submitCraving() {
        const strength = document.getElementById('cravingRange').value;
        const reason = document.getElementById('cravingReason').value;
        const etc = document.getElementById('etcReason').value;
        
        const entry = {
            date: new Date().toLocaleString('ko-KR', {month:'short', day:'numeric', hour:'numeric', minute:'numeric'}),
            strength: parseInt(strength),
            reason: reason === '기타' ? etc : reason
        };

        cravingData.push(entry);
        localStorage.setItem('cravingHistory', JSON.stringify(cravingData));
        updateCravingUI();
        closeModal('cravingModal');
        alert("기록되었습니다. 이 고비만 넘기면 몸은 더 건강해질 거예요!");
    }

    function openStats() {
        if (cravingData.length === 0) return alert("아직 기록된 고비가 없습니다.");
        openModal('statsModal');
        
        setTimeout(() => {
            const ctx = document.getElementById('cravingHistoryChart').getContext('2d');
            const lastData = cravingData.slice(-10); // 최근 10개만

            if (statsChart) statsChart.destroy();
            statsChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: lastData.map(d => d.date),
                    datasets: [{
                        label: '갈망 강도',
                        data: lastData.map(d => d.strength),
                        backgroundColor: 'rgba(231, 76, 60, 0.6)',
                        borderColor: 'rgb(231, 76, 60)',
                        borderWidth: 1,
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true, max: 10 } }
                }
            });
        }, 100);
    }

    /* 기존 금주 앱 로직 */
    function renderChangeCards() {
        const list = document.getElementById('changeList');
        list.innerHTML = stages.map((s, i) => `
            <div class="change-card" id="card${i}">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:bold; font-size:0.9rem;">${s.t}</span>
                    <div class="progress-bg"><div class="progress-fill" id="fill${i}"></div></div>
                </div>
                <p style="font-size:0.8rem; color:#666; margin:5px 0 0 0;">${s.desc}</p>
            </div>
        `).join('');
    }

    function saveDate() {
        const input = document.getElementById('dateTimeInput').value;
        if (!input) return alert("날짜를 선택해주세요.");
        localStorage.setItem('quitDrinkingDateTime', input);
        startApp(input);
    }

    function startApp(startISO) {
        document.getElementById('setupArea').style.display = 'none';
        document.getElementById('displayArea').style.display = 'block';
        
        const allPoints = [];
        for (let i = 0; i <= 365; i++) allPoints.push({x: i, y: Math.round(1000 * Math.exp(-0.04 * i))});

        const ctx = document.getElementById('survivalChart').getContext('2d');
        mainChart = new Chart(ctx, {
            type: 'line',
            data: { datasets: [{ label: '유지자', data: allPoints, borderColor: '#3498db', pointRadius: 0, fill: true, backgroundColor: 'rgba(52,152,219,0.1)' }] },
            options: { 
                responsive: true, maintainAspectRatio: false,
                scales: { x: { type: 'linear', min: 0, max: 100 }, y: { beginAtZero: true } },
                plugins: { annotation: { annotations: { line1: { type: 'line', xMin: 0, xMax: 0, borderColor: 'red', borderWidth: 2 } } }, legend: {display: false} }
            }
        });

        timerInterval = setInterval(() => {
            const diff = new Date() - new Date(startISO);
            const days = diff / (24 * 60 * 60 * 1000);
            document.getElementById('mainDays').innerText = Math.floor(days) + "일";
            document.getElementById('subTime').innerText = `${Math.floor((diff/3600000)%24)}시간 ${Math.floor((diff/60000)%60)}분 ${Math.floor((diff/1000)%60)}초`;
            
            const survivors = Math.max(1, Math.round(1000 * Math.exp(-0.04 * Math.floor(days))));
            document.getElementById('survivors').innerText = survivors.toLocaleString();
            document.getElementById('myRank').innerText = survivors.toLocaleString();

            mainChart.options.plugins.annotation.annotations.line1.xMin = days;
            mainChart.options.plugins.annotation.annotations.line1.xMax = days;
            mainChart.update('none');

            stages.forEach((s, i) => {
                const perc = Math.min((days / s.d) * 100, 100);
                const fill = document.getElementById(`fill${i}`);
                fill.style.width = perc + '%';
                if(perc >= 100) document.getElementById(`card${i}`).classList.add('active');
            });
        }, 1000);
    }

    function resetDate() {
        if (confirm("모든 데이터(금주 기록 및 갈망 통계)를 초기화할까요?")) {
            localStorage.clear();
            location.reload();
        }
    }
</script>

</body>
</html>
