<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>음주 조절 모드</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.0.1"></script>
    
    <style>
        :root {
            --primary-color: #9b59b6; 
            --danger-color: #e74c3c;
            --success-color: #2ecc71;
            --warning-color: #f39c12;
            --info-color: #3498db;
            --bg-color: #f0f2f5;
            --text-dark: #2d3748;
        }
        
        body { font-family: 'Pretendard', -apple-system, sans-serif; text-align: center; padding: 15px; background-color: var(--bg-color); color: #333; line-height: 1.6; display: flex; flex-direction: column; min-height: 95vh; }
        .container { flex: 1; max-width: 550px; width: 100%; margin: 0 auto; background: white; padding: 30px 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); box-sizing: border-box; }
        h1 { font-size: 1.6rem; white-space: nowrap; word-break: keep-all; margin-bottom: 25px; letter-spacing: -0.5px; color: var(--text-dark); }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 0.9rem; color: #666; }
        .back-btn { background: #f1f3f5; border: none; padding: 6px 12px; border-radius: 8px; font-weight: 600; cursor: pointer; color: #495057; text-decoration: none; transition: 0.2s; }
        .back-btn:active { background: #e2e8f0; }
        
        .card-box { background: #fdfdfd; border: 1px solid #e2e8f0; border-radius: 20px; padding: 25px 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .card-title { font-size: 1.1rem; font-weight: 800; color: var(--primary-color); margin-bottom: 15px; text-align: left; display: flex; align-items: center; gap: 8px; }
        
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-weight: 700; font-size: 0.9rem; color: #4a5568; margin-bottom: 6px; }
        input[type="number"], select { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 12px; font-size: 1rem; font-family: inherit; box-sizing: border-box; background: #fff; }
        input[type="number"]:focus, select:focus { border-color: var(--primary-color); outline: none; }
        
        .action-btn { width: 100%; padding: 18px; font-size: 1.1rem; font-weight: 800; color: white; border: none; border-radius: 16px; cursor: pointer; box-shadow: 0 8px 15px rgba(0,0,0,0.1); transition: transform 0.2s; margin-top: 10px; }
        .action-btn:active { transform: scale(0.97); }
        .btn-start { background: linear-gradient(135deg, #9b59b6, #8e44ad); }
        .btn-add { background: linear-gradient(135deg, #3498db, #2980b9); }
        .btn-save { background: linear-gradient(135deg, #27ae60, #2ecc71); }
        .btn-end { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        
        .status-display { font-size: 1.1rem; font-weight: 800; color: var(--text-dark); background: #f0f7ff; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px dashed #3498db; }
        
        .chart-container { position: relative; height: 250px; width: 100%; margin-top: 15px; margin-bottom: 20px; display: none; /* 초기에는 숨김 */ }
        #loadingArea { display: flex; align-items: center; justify-content: center; height: 50vh; color: #718096; font-weight: bold; }

        /* 음주 리스트 스타일 */
        .drink-list-container { display: flex; flex-direction: column; gap: 12px; margin-top: 15px; margin-bottom: 20px; }
        .drink-item { background: #fff; border: 1px solid #e2e8f0; border-radius: 14px; padding: 15px; text-align: left; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .drink-item-header { font-size: 1rem; font-weight: 800; color: var(--primary-color); margin-bottom: 4px; display:flex; justify-content:space-between; align-items:center; }
        .drink-item-time { font-size: 0.8rem; color: #a0aec0; margin-bottom: 10px; }
        .drink-item-stats { font-size: 0.85rem; color: #4a5568; background: #f8f9fa; padding: 10px; border-radius: 10px; line-height: 1.5; }
        .delete-drink-btn { color: var(--danger-color); font-weight: 800; font-size: 1.2rem; background: none; border: none; padding: 0; cursor: pointer; line-height: 1; }
        
        /* 과거 세션 리스트 스타일 */
        .history-item { background: #f8f9fa; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; margin-bottom: 10px; text-align: left; cursor: pointer; transition: 0.2s; }
        .history-item:hover { background: #edf2f7; border-color: #cbd5e0; }
        .history-date { font-weight: 800; color: #2d3748; margin-bottom: 5px; font-size: 0.95rem; }
        .history-summary { font-size: 0.85rem; color: #718096; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-bar">
        <span id="userNameDisplay" style="font-weight: 700; color: var(--primary-color);">로딩 중...</span>
        <button class="back-btn" onclick="location.href='index.html'">리포트로 복귀</button>
    </div>

    <h1>🍷 음주 조절 모드</h1>
    <p style="font-size: 0.9rem; color: #666; word-break: keep-all; margin-bottom: 25px;">
        단주가 깨졌더라도, 이성의 끈을 놓지 않고 자신의 <b>알코올 섭취량을 철저히 통제</b>하는 훈련 모드입니다.
    </p>

    <div id="loadingArea">로그인 상태 확인 중...</div>

    <div id="mainControlArea" style="display: none;">
        <!-- 1. 기본 설정 및 시작 카드 -->
        <div class="card-box" id="setupCard">
            <div class="card-title"><span>📝</span> 기본 신체 및 식사 정보</div>
            
            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex: 1;">
                    <label>성별</label>
                    <select id="userGender">
                        <option value="male">남성</option>
                        <option value="female">여성</option>
                    </select>
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>체중 (kg)</label>
                    <input type="number" id="userWeight" placeholder="예: 70" value="70">
                </div>
            </div>

            <div class="input-group">
                <label>식사 상태 (안주량)</label>
                <select id="userMeal">
                    <option value="0.5">완전 공복 (흡수 매우 빠름)</option>
                    <option value="1.0" selected>가벼운 식사/안주 (보통)</option>
                    <option value="1.5">든든한 식사 (흡수 지연)</option>
                </select>
            </div>

            <button class="action-btn btn-start" onclick="startDrinkingSession()">⏱️ 음주 시작 (타이머 구동)</button>

            <!-- 과거 기록 리스트 영역 -->
            <div style="border-top: 1px solid #e2e8f0; margin: 25px 0 15px 0;"></div>
            <div class="card-title" style="font-size: 1rem; color: #4a5568;"><span>📚</span> 과거 음주 조절 기록</div>
            <div id="pastSessionsContainer">
                <div style="font-size: 0.85rem; color: #a0aec0;">기록을 불러오는 중...</div>
            </div>
        </div>

        <!-- 2. 음주 기록 및 진행 카드 -->
        <div class="card-box" id="activeCard" style="display: none;">
            <div class="card-title"><span>⏳</span> 통제 하에 음주 중...</div>
            <div class="status-display" id="elapsedTimeDisplay">음주 진행 시간: 00:00:00</div>
            
            <div style="border-top: 1px dashed #e2e8f0; margin: 20px 0;"></div>

            <div class="input-group">
                <label>드시는 술 종류</label>
                <select id="drinkType">
                    <option value="4.5">맥주 (4.5%)</option>
                    <option value="16.5">소주 (16.5%)</option>
                    <option value="13.0">와인 (13%)</option>
                    <option value="40.0">위스키 (40%)</option>
                </select>
            </div>
            
            <div class="input-group">
                <label>용량 (ml)</label>
                <input type="number" id="drinkVolume" placeholder="예: 500" value="500">
            </div>

            <button class="action-btn btn-add" onclick="addDrinkItem()">🍺 해당 용량 음주완료 기록</button>
            
            <!-- 실시간 차트 영역 (최초엔 숨김) -->
            <div class="chart-container" id="activeChartContainer">
                <canvas id="activeBacChart"></canvas>
            </div>
            
            <!-- 음주 기록 리스트 -->
            <div class="drink-list-container" id="drinkListContainer">
                <!-- 동적으로 리스트가 추가되는 영역 -->
            </div>

            <div style="border-top: 1px solid #e2e8f0; margin: 25px 0 15px 0;"></div>
            
            <button class="action-btn btn-save" onclick="saveCurrentSession()">💾 현재 음주 내용 저장</button>
            <button class="action-btn btn-end" onclick="finishDrinkingSession()">🛑 음주 세션 완전히 종료 및 저장</button>
            <button class="back-btn" style="width: 100%; padding: 12px; margin-top: 10px;" onclick="cancelDrinkingSession()">현재 세션 취소 (저장 안함)</button>
        </div>

        <!-- 3. 과거 기록 상세 카드 -->
        <div class="card-box" id="historyCard" style="display: none;">
            <div class="card-title"><span>📜</span> 세션 기록 상세 보기</div>
            <p id="historySummary" style="font-size: 0.85rem; color: #4a5568; line-height: 1.5; text-align: left; margin-bottom: 10px;"></p>
            
            <div class="chart-container" style="display: block;">
                <canvas id="historyBacChart"></canvas>
            </div>
            
            <div class="drink-list-container" id="historyDrinkListContainer">
                <!-- 과거 내역이 채워짐 -->
            </div>
            
            <button class="back-btn" style="width: 100%; padding: 15px; margin-top: 20px; border: 1px solid #ddd;" onclick="closeHistory()">목록으로 돌아가기</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, doc, updateDoc, getDocs, query, where, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBWDwueP3a0atxCqFIgqd96sgXc0EqYbEY",
        authDomain: "alcoholaway.firebaseapp.com",
        projectId: "alcoholaway",
        storageBucket: "alcoholaway.firebasestorage.app",
        messagingSenderId: "1001199235857",
        appId: "1:1001199235857:web:362c4aae36b44c7eae12b0",
        measurementId: "G-JBE26PCZMF"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let userId = null;
    let sessionStartTime = null;
    let drinksList = []; 
    let timerInterval = null;
    let activeChartInstance = null;
    let historyChartInstance = null;
    let pastSessionsData = [];
    
    // DB의 현재 세션 문서 ID를 저장 (중간 저장 업데이트용)
    let currentSessionDocId = null; 

    // 로그인 상태 감지
    onAuthStateChanged(auth, (user) => {
        if (user) {
            userId = user.uid;
            document.getElementById('loadingArea').style.display = 'none';
            document.getElementById('mainControlArea').style.display = 'block';
            document.getElementById('userNameDisplay').innerText = (user.displayName || '도전자') + '님의 조절 모드';
            
            // 로그인 완료 후 과거 기록 불러오기
            loadPastSessions();
        } else {
            alert("로그인이 필요합니다. 메인 리포트 화면으로 이동합니다.");
            window.location.href = 'index.html';
        }
    });

    // DB에서 과거 기록 불러오기
    async function loadPastSessions() {
        const container = document.getElementById('pastSessionsContainer');
        container.innerHTML = '<div style="font-size: 0.85rem; color: #a0aec0;">데이터를 불러오는 중...</div>';
        
        try {
            const q = query(collection(db, "drinking_sessions"), where("userId", "==", userId), orderBy("startTime", "desc"));
            const querySnapshot = await getDocs(q);
            pastSessionsData = [];
            
            if (querySnapshot.empty) {
                container.innerHTML = '<div style="font-size: 0.85rem; color: #a0aec0;">아직 완료된 기록이 없습니다. 첫 조절 모드를 시작해보세요!</div>';
                return;
            }

            let html = '';
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                pastSessionsData.push({ id: doc.id, ...data });
                
                const startDate = new Date(data.startTime);
                const dateStr = startDate.toLocaleDateString('ko-KR', { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
                const totalDrinks = data.drinksList ? data.drinksList.length : 0;
                const statusStr = data.isFinished ? "종료됨" : "진행중/중간저장";
                
                html += `
                    <div class="history-item" onclick="viewHistory('${doc.id}')">
                        <div class="history-date">${dateStr} 세션 <span style="font-size:0.75rem; color:#a0aec0; font-weight:normal;">(${statusStr})</span></div>
                        <div class="history-summary">
                            총 ${totalDrinks}잔 / 섭취 알코올 ${(data.totalAlcoholGrams || 0).toFixed(1)}g<br>
                            최고 도달 농도: <b>${(data.maxBac || 0).toFixed(3)}%</b>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        } catch (error) {
            console.error("Error loading sessions: ", error);
            container.innerHTML = '<div style="font-size: 0.85rem; color: var(--danger-color);">기록을 불러오는데 실패했습니다.</div>';
        }
    }

    window.startDrinkingSession = function() {
        const weight = document.getElementById('userWeight').value;
        if(!weight || weight <= 0) return alert("체중을 올바르게 입력해주세요.");

        sessionStartTime = new Date();
        drinksList = [];
        currentSessionDocId = null; // 새 세션이므로 문서 ID 초기화
        
        document.getElementById('setupCard').style.display = 'none';
        document.getElementById('historyCard').style.display = 'none';
        document.getElementById('activeCard').style.display = 'block';
        
        // 초기에는 음주 기록이 없으므로 차트 숨김
        document.getElementById('activeChartContainer').style.display = 'none'; 
        renderDrinkList();

        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            const diff = new Date() - sessionStartTime;
            const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
            const m = Math.floor((diff / 60000) % 60).toString().padStart(2, '0');
            const s = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
            document.getElementById('elapsedTimeDisplay').innerText = `음주 진행 시간: ${h}:${m}:${s}`;
        }, 1000);
    };

    window.cancelDrinkingSession = function() {
        if(confirm("기록 중인 음주 세션을 완전히 취소하시겠습니까? (이후 내용은 저장되지 않습니다)")) {
            sessionStartTime = null;
            drinksList = [];
            currentSessionDocId = null;
            if(timerInterval) clearInterval(timerInterval);
            
            document.getElementById('setupCard').style.display = 'block';
            document.getElementById('activeCard').style.display = 'none';
            document.getElementById('drinkVolume').value = '500';
            
            // 취소했어도 중간 저장을 했었다면 리스트를 새로 갱신해줍니다.
            loadPastSessions();
        }
    };

    window.addDrinkItem = function() {
        const gender = document.getElementById('userGender').value;
        const weight = parseFloat(document.getElementById('userWeight').value);
        const drinkTypeSelect = document.getElementById('drinkType');
        const abv = parseFloat(drinkTypeSelect.value);
        const drinkName = drinkTypeSelect.options[drinkTypeSelect.selectedIndex].text;
        const volume = parseFloat(document.getElementById('drinkVolume').value);

        if(!volume || volume <= 0) return alert("용량을 올바르게 입력해주세요.");

        const now = new Date();
        const prevTime = drinksList.length > 0 ? new Date(drinksList[drinksList.length - 1].endTime) : sessionStartTime;
        const gapMs = now.getTime() - prevTime.getTime();
        const gapMinutes = Math.round(gapMs / 60000);

        const r = gender === 'male' ? 0.86 : 0.64;
        const alcoholGrams = volume * (abv / 100) * 0.7894;
        const cMaxContribution = (alcoholGrams * 0.7) / (weight * r * 10);

        drinksList.push({
            id: Date.now(),
            drinkName: drinkName,
            abv: abv,
            volume: volume,
            prevTime: prevTime.getTime(), 
            endTime: now.getTime(),
            gapMinutes: gapMinutes,
            alcoholGrams: alcoholGrams,
            cMaxContribution: cMaxContribution
        });

        renderDrinkList();
        
        // 술이 한 잔이라도 추가되면 차트 영역을 보이게 함
        document.getElementById('activeChartContainer').style.display = 'block';
        updateActiveChart(); 
    };

    window.deleteDrink = function(index) {
        if(confirm("이 음주 기록을 삭제하시겠습니까? (삭제 시 혈중농도가 자동 재계산됩니다)")) {
            drinksList.splice(index, 1);
            
            if(drinksList.length === 0) {
                // 다 지워지면 차트 다시 숨김
                document.getElementById('activeChartContainer').style.display = 'none';
            } else {
                for(let i = 0; i < drinksList.length; i++) {
                    const prevTime = i > 0 ? drinksList[i-1].endTime : sessionStartTime.getTime();
                    drinksList[i].prevTime = prevTime;
                    drinksList[i].gapMinutes = Math.round((drinksList[i].endTime - prevTime) / 60000);
                }
                updateActiveChart();
            }
            renderDrinkList();
        }
    };

    function renderDrinkList() {
        const container = document.getElementById('drinkListContainer');
        container.innerHTML = '';

        if(drinksList.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:15px; color:#a0aec0; font-size:0.85rem;">아직 기록된 음주 내용이 없습니다. 위 버튼을 눌러 기록을 시작하세요.</div>';
            return;
        }

        const mealOffsetHrs = parseFloat(document.getElementById('userMeal').value);

        let html = '';
        for (let i = 0; i < drinksList.length; i++) {
            const d = drinksList[i];
            
            const pTime = new Date(d.prevTime);
            const eTime = new Date(d.endTime);

            const startStr = pTime.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
            const endStr = eTime.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
            
            const maxBacDate = new Date(eTime.getTime() + (mealOffsetHrs * 60 * 60000));
            const maxBacTimeStr = maxBacDate.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });

            let timeLabel = i === 0 ? `음주 시작(${startStr}) 후 ${d.gapMinutes}분 소요` : `직전 잔(${startStr}) 이후 ${d.gapMinutes}분 소요`;

            let accCMax = 0;
            for (let j = 0; j <= i; j++) accCMax += drinksList[j].cMaxContribution;
            
            const elapsedHrs = (eTime.getTime() - sessionStartTime.getTime()) / 3600000;
            const currentEstBAC = Math.max(0, accCMax - (0.015 * elapsedHrs));

            html += `
                <div class="drink-item">
                    <button class="delete-drink-btn" onclick="deleteDrink(${i})" title="삭제">&times;</button>
                    <div class="drink-item-header">
                        <span>${d.drinkName} - ${d.volume}ml</span>
                    </div>
                    <div class="drink-item-time">${timeLabel} (완료: ${endStr})</div>
                    <div class="drink-item-stats">
                        • 섭취 알코올: <b>${d.alcoholGrams.toFixed(1)}g</b><br>
                        • 이 잔의 누적 예상 BAC 기여: <b style="color:var(--danger-color);">${currentEstBAC.toFixed(3)}%</b><br>
                        • 최고농도 도달 예상 시각: <b>${maxBacTimeStr} 경</b>
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    function updateActiveChart() {
        if(drinksList.length === 0) return;
        const mealOffsetHrs = parseFloat(document.getElementById('userMeal').value);
        const chartData = generateChartData(drinksList, sessionStartTime.getTime(), mealOffsetHrs);
        drawChart(chartData, 'activeBacChart', activeChartInstance, (instance) => activeChartInstance = instance);
    }

    // 중간 저장 버튼
    window.saveCurrentSession = async function() {
        await executeSaveProcess(false);
    };

    // 최종 종료 저장 버튼
    window.finishDrinkingSession = async function() {
        if(drinksList.length === 0) {
            alert("기록된 음주 내역이 없어 세션을 종료할 수 없습니다.");
            return;
        }
        await executeSaveProcess(true);
    };

    // 저장 통합 로직
    async function executeSaveProcess(isFinal) {
        if(drinksList.length === 0 && !isFinal) {
            alert("저장할 음주 기록이 없습니다.");
            return;
        }
        
        if(isFinal && timerInterval) clearInterval(timerInterval);

        const mealOffsetHrs = parseFloat(document.getElementById('userMeal').value);
        const chartData = generateChartData(drinksList, sessionStartTime.getTime(), mealOffsetHrs);
        const totalAlcoholGrams = drinksList.reduce((sum, d) => sum + d.alcoholGrams, 0);

        const sessionData = {
            userId: userId,
            startTime: sessionStartTime.getTime(),
            endTime: new Date().getTime(),
            mealOffsetHrs: mealOffsetHrs,
            gender: document.getElementById('userGender').value,
            weight: parseFloat(document.getElementById('userWeight').value),
            drinksList: drinksList,
            maxBac: chartData.maxBac,
            totalAlcoholGrams: totalAlcoholGrams,
            isFinished: isFinal, // 최종 종료 여부 플래그
            updatedAt: serverTimestamp()
        };

        const prevDisplay = document.getElementById('activeCard').style.display;
        
        // UI를 '저장 중'으로 변경 (최종 저장 시에만 완전히 카드 숨김)
        if(isFinal) {
            document.getElementById('activeCard').style.display = 'none';
            document.getElementById('loadingArea').innerText = "결과를 저장하고 있습니다...";
            document.getElementById('loadingArea').style.display = 'flex';
        }

        try {
            if (currentSessionDocId) {
                // 이미 저장된 문서가 있으면 업데이트
                const docRef = doc(db, "drinking_sessions", currentSessionDocId);
                await updateDoc(docRef, sessionData);
                if(!isFinal) alert("현재 음주 상태가 저장되었습니다.");
            } else {
                // 첫 저장이면 새로 문서 생성
                sessionData.createdAt = serverTimestamp();
                const docRef = await addDoc(collection(db, "drinking_sessions"), sessionData);
                currentSessionDocId = docRef.id; // 생성된 ID 기억
                if(!isFinal) alert("현재 음주 상태가 새로 저장되었습니다.");
            }
            
            if(isFinal) {
                alert("음주 세션이 성공적으로 기록 및 종료되었습니다.");
                // 초기화 및 셋업 카드로 복귀
                sessionStartTime = null;
                drinksList = [];
                currentSessionDocId = null;
                document.getElementById('drinkVolume').value = '500';
                
                document.getElementById('loadingArea').style.display = 'none';
                document.getElementById('setupCard').style.display = 'block';
            }
            
            // 리스트 새로고침
            loadPastSessions();

        } catch (error) {
            console.error("Error saving document: ", error);
            // 요청하신 상세 오류 메시지 표기 부분
            alert("저장 중 오류가 발생했습니다.\n\n상세 내용: " + error.message);
            
            if(isFinal) {
                document.getElementById('loadingArea').style.display = 'none';
                document.getElementById('activeCard').style.display = prevDisplay; // 에러 시 복구
            }
        }
    }

    window.viewHistory = function(sessionId) {
        const sessionData = pastSessionsData.find(s => s.id === sessionId);
        if(!sessionData) return;

        document.getElementById('setupCard').style.display = 'none';
        document.getElementById('historyCard').style.display = 'block';

        const chartData = generateChartData(sessionData.drinksList, sessionData.startTime, sessionData.mealOffsetHrs);
        const totalClearHrs = chartData.dataPoints.length * 15 / 60; 
        const statusStr = sessionData.isFinished ? "종료됨" : "진행중 (또는 중단됨)";

        document.getElementById('historySummary').innerHTML = `
            세션 상태: <b>${statusStr}</b><br>
            세션 일시: <b>${new Date(sessionData.startTime).toLocaleString('ko-KR')}</b><br>
            총 <b>${sessionData.drinksList ? sessionData.drinksList.length : 0}잔</b> / 알코올 <b>${(sessionData.totalAlcoholGrams || 0).toFixed(1)}g</b> 섭취<br>
            • 종합 예상 최고 농도: <b style="color:var(--danger-color);">${(chartData.maxBac || 0).toFixed(3)}%</b><br>
            • 알코올 완전 분해 소요: 약 <b style="color:var(--info-color);">${totalClearHrs.toFixed(1)}시간</b>
        `;

        drawChart(chartData, 'historyBacChart', historyChartInstance, (instance) => historyChartInstance = instance);

        const container = document.getElementById('historyDrinkListContainer');
        let html = '';
        if(sessionData.drinksList) {
            sessionData.drinksList.forEach((d, i) => {
                const eTime = new Date(d.endTime);
                const endStr = eTime.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                const maxBacDate = new Date(eTime.getTime() + (sessionData.mealOffsetHrs * 60 * 60000));
                const maxBacTimeStr = maxBacDate.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });

                html += `
                    <div class="drink-item">
                        <div class="drink-item-header">
                            <span>${d.drinkName} - ${d.volume}ml</span>
                        </div>
                        <div class="drink-item-time">완료 시각: ${endStr} / 시작기준 ${d.gapMinutes}분 간격</div>
                        <div class="drink-item-stats">
                            • 섭취 알코올: <b>${d.alcoholGrams.toFixed(1)}g</b><br>
                            • 예상 최고 BAC 기여도: <b>${d.cMaxContribution.toFixed(3)}%</b><br>
                            • 이 잔의 최고농도 도달 시각: <b>${maxBacTimeStr} 경</b>
                        </div>
                    </div>
                `;
            });
        }
        container.innerHTML = html;
    };

    window.closeHistory = function() {
        document.getElementById('historyCard').style.display = 'none';
        document.getElementById('setupCard').style.display = 'block';
    };


    // === 공통 시뮬레이터 및 차트 그리기 모듈 ===
    function generateChartData(targetDrinksList, startMs, mealOffsetHrs) {
        const mealOffsetMin = mealOffsetHrs * 60;
        const dataPoints = [];
        const labels = [];
        
        let maxBac = 0;
        if(!targetDrinksList || targetDrinksList.length === 0) {
            return { labels: ['00:00'], dataPoints: [0], maxBac: 0 };
        }

        const lastDrinkFullyAbsorbedTime = targetDrinksList[targetDrinksList.length - 1].endTime + (mealOffsetMin * 60000);
        
        for (let m = 0; m <= 24 * 60; m += 15) {
            let currentMs = startMs + (m * 60000);
            let timeObj = new Date(currentMs);
            let timeLabel = timeObj.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
            
            let totalAbsorbedBAC = 0;
            targetDrinksList.forEach(d => {
                if (currentMs >= d.endTime) {
                    let elapsedSinceDrinkMin = (currentMs - d.endTime) / 60000;
                    if (elapsedSinceDrinkMin >= mealOffsetMin) {
                        totalAbsorbedBAC += d.cMaxContribution; // 100% 흡수
                    } else {
                        totalAbsorbedBAC += d.cMaxContribution * (elapsedSinceDrinkMin / mealOffsetMin); // 선형 부분 흡수
                    }
                }
            });
            
            let elapsedHoursTotal = m / 60;
            let bac = Math.max(0, totalAbsorbedBAC - (0.015 * elapsedHoursTotal));
            if (bac > maxBac) maxBac = bac;
            
            labels.push(timeLabel);
            dataPoints.push(bac.toFixed(3));
            
            if (bac === 0 && currentMs > lastDrinkFullyAbsorbedTime) {
                break;
            }
        }
        return { labels, dataPoints, maxBac };
    }

    function drawChart(chartData, canvasId, existingInstance, setInstanceCallback) {
        if (existingInstance) existingInstance.destroy();
        const ctx = document.getElementById(canvasId).getContext('2d');
        
        const newInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: chartData.labels,
                datasets: [{
                    label: '혈중 알코올 농도 (%)',
                    data: chartData.dataPoints,
                    borderColor: '#9b59b6',
                    backgroundColor: 'rgba(155, 89, 182, 0.2)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { 
                        beginAtZero: true, 
                        title: { display: true, text: 'BAC (%)' }
                    },
                    x: {
                        ticks: { maxTicksLimit: 6 }
                    }
                },
                plugins: {
                    legend: { display: false },
                    annotation: {
                        annotations: {
                            dangerLine: {
                                type: 'line',
                                yMin: 0.03,
                                yMax: 0.03,
                                borderColor: '#e74c3c',
                                borderWidth: 2,
                                borderDash: [4, 4],
                                label: {
                                    display: true,
                                    content: '면허정지 (0.03%)',
                                    position: 'start',
                                    backgroundColor: '#e74c3c',
                                    font: { size: 10 }
                                }
                            }
                        }
                    }
                }
            }
        });
        setInstanceCallback(newInstance);
    }
</script>
